<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lena Scent</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#e8d5a3;--gold-dim:#7a6030;--dark:#1a1410;--mid:#4a3f35;--light:#8a7a6a;--bg:#f5f0e8;--card:#fffdf9;--border:#e8ddd0;--green:#3d7a52;--red:#8b3535;--amber:#b8860b;--blue:#3a5f8b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:32px;}
#loginScreen.hidden{display:none;}
.login-logo{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:36px;font-weight:300;letter-spacing:6px;text-transform:uppercase;margin-bottom:6px;}
.login-logo em{font-style:italic;color:var(--gold-light);}
.login-sub{color:var(--gold-dim);font-size:12px;letter-spacing:2px;margin-bottom:40px;}
.login-box{width:100%;max-width:320px;}
.login-field{margin-bottom:14px;}
.login-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gold-dim);margin-bottom:5px;display:block;}
.login-input{width:100%;padding:13px 15px;background:#2a2018;border:1px solid #3a3025;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;color:var(--gold-light);outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--gold);}
.login-input::placeholder{color:var(--gold-dim);}
.login-btn{width:100%;padding:14px;background:var(--gold);color:var(--dark);border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;margin-top:6px;transition:background .2s;}
.login-btn:hover{background:var(--gold-light);}
.login-err{color:#e07070;font-size:12px;text-align:center;margin-top:10px;min-height:18px;}

/* ── APP ── */
#app{display:none;}
#app.visible{display:block;}
header{background:var(--dark);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.35);}
.logo{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:18px;font-weight:300;letter-spacing:4px;text-transform:uppercase;}
.logo em{font-style:italic;color:var(--gold-light);}
.user-chip{display:flex;align-items:center;gap:8px;}
.user-name{color:var(--gold-dim);font-size:11px;letter-spacing:1px;}
.logout-btn{background:none;border:none;color:var(--gold-dim);font-size:11px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color .2s;}
.logout-btn:hover{color:var(--gold);}
.sync-indicator{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-indicator.loading{background:var(--amber);animation:pulse .8s ease-in-out infinite;}
.sync-indicator.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.tabs{display:flex;background:var(--dark);border-top:1px solid #2a2018;overflow-x:auto;}
.tab{flex:1;min-width:65px;padding:10px 5px;text-align:center;font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;color:var(--light);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:var(--gold-light);}
.tab.hidden{display:none;}

.content{padding:14px;max-width:860px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px 11px;}
.kpi.main{background:var(--dark);border-color:var(--gold);grid-column:span 3;display:flex;align-items:center;gap:16px;padding:15px 18px;}
.kpi-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--light);margin-bottom:4px;}
.kpi.main .kpi-label{color:var(--gold-dim);}
.kpi-value{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--dark);}
.kpi.main .kpi-value{font-size:27px;color:var(--gold);}
.kpi-sub{font-size:10px;color:var(--light);margin-top:2px;}
.kpi.main .kpi-sub{color:var(--gold-dim);}
.kpi-divider{width:1px;background:var(--gold-dim);align-self:stretch;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:7px;}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;}

.block{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:15px;margin-bottom:14px;}
.block-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--light);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.block-title::before{content:'';width:3px;height:11px;background:var(--gold);border-radius:2px;display:inline-block;}

/* bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:80px;}
.bc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bc-bars{display:flex;align-items:flex-end;gap:2px;height:72px;}
.bc-bar{border-radius:3px 3px 0 0;min-height:2px;flex:1;}
.bc-bar.prov{background:var(--border);}
.bc-bar.receb{background:var(--gold);}
.bc-bar.open{background:var(--red);opacity:.65;}
.bc-label{font-size:8px;color:var(--light);}
.legend{display:flex;gap:12px;margin-top:9px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mid);}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* search + filter */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{width:100%;padding:10px 14px 10px 36px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;color:var(--dark);outline:none;}
.search-wrap input:focus{border-color:var(--gold);}
.search-wrap::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--light);font-size:17px;}
.ftabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.ftab{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--mid);transition:all .2s;}
.ftab.active{background:var(--dark);color:var(--gold);border-color:var(--dark);}

/* client cards */
.cli-list{display:flex;flex-direction:column;gap:7px;}
.cli-card{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.cli-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.cli-header{display:flex;align-items:center;padding:12px 14px;gap:10px;}
.cli-avatar{width:35px;height:35px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);flex-shrink:0;}
.cli-info{flex:1;min-width:0;}
.cli-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cli-meta{font-size:10px;color:var(--light);margin-top:1px;}
.cli-saldo{text-align:right;flex-shrink:0;}
.saldo-v{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;}
.saldo-v.zero{color:var(--green);}.saldo-v.pos{color:var(--red);}
.saldo-lbl{font-size:9px;color:var(--light);text-transform:uppercase;letter-spacing:.5px;}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;backdrop-filter:blur(4px);}
.overlay.open{display:flex;align-items:flex-end;}
.modal{background:var(--bg);width:100%;max-height:92vh;border-radius:20px 20px 0 0;overflow-y:auto;padding-bottom:32px;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 6px;}
.m-head{padding:7px 17px 13px;border-bottom:1px solid var(--border);}
.m-name{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:300;}
.m-meta{font-size:11px;color:var(--light);margin-top:2px;}
.m-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:12px 17px;border-bottom:1px solid var(--border);}
.mst{text-align:center;padding:9px 6px;background:var(--card);border-radius:8px;border:1px solid var(--border);}
.mst-v{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;}
.mst-l{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--light);margin-top:2px;}
.m-stitle{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--light);padding:11px 17px 6px;display:flex;align-items:center;justify-content:space-between;}
.tbl-wrap{padding:0 17px 4px;overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;}
.tbl td,.tbl th{padding:8px;font-size:12px;border-bottom:1px solid var(--border);}
.tbl th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--light);font-weight:500;background:var(--bg);}
.tbl td:last-child,.tbl th:last-child{text-align:right;}
.parc-row{display:flex;align-items:center;padding:9px 17px;border-bottom:1px solid var(--border);gap:9px;}
.parc-date{font-size:12px;color:var(--mid);min-width:72px;font-weight:500;}
.st-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.st-pago{background:var(--green);}.st-parcial{background:var(--amber);}.st-aberto{background:var(--blue);}.st-vencido{background:var(--red);}
.parc-right{text-align:right;margin-left:auto;}
.parc-valor{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;}
.parc-falta{font-size:10px;margin-top:1px;}
.receb-row{display:flex;align-items:center;padding:8px 17px;border-bottom:1px solid var(--border);gap:9px;}
.receb-dt{font-size:12px;color:var(--mid);min-width:72px;}
.receb-v{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--green);margin-left:auto;}
.empty{text-align:center;padding:28px;color:var(--light);font-size:13px;}

/* projeção */
.proj-wrap{overflow-x:auto;}
.proj-table{width:100%;border-collapse:collapse;min-width:340px;}
.proj-table th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--light);font-weight:500;padding:8px 12px;text-align:right;border-bottom:2px solid var(--border);background:var(--bg);}
.proj-table th:first-child{text-align:left;}
.proj-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);text-align:right;vertical-align:middle;}
.proj-table td:first-child{text-align:left;font-weight:500;}
.proj-table tr.cur-m{background:#fffbf0;}
.proj-table tr.cur-m td:first-child{color:var(--gold);}
.num{font-family:'Cormorant Garamond',serif;font-size:15px;}
.pct-tag{font-size:9px;color:var(--light);}
.mini-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.mini-fill{height:100%;border-radius:2px;}

/* ranking */
.rank-row{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;}
.rank-row:hover{background:#faf7f2;}
.rank-n{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold-light);min-width:24px;}
.rank-info{flex:1;}
.rank-name{font-size:13px;font-weight:500;}
.rank-meta{font-size:10px;color:var(--light);}
.rank-v{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--red);font-weight:600;text-align:right;}

/* form sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;backdrop-filter:blur(4px);align-items:flex-end;}
.sheet-overlay.open{display:flex;}
.sheet{background:var(--bg);width:100%;max-height:90vh;border-radius:20px 20px 0 0;overflow-y:auto;padding-bottom:32px;animation:slideUp .25s ease;}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;}
.sheet-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;}
.sheet-close{font-size:20px;color:var(--light);cursor:pointer;padding:4px 8px;}
.form-body{padding:0 18px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--light);margin-bottom:5px;display:block;}
.form-input{width:100%;padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:9px;font-family:'Inter',sans-serif;font-size:14px;color:var(--dark);outline:none;}
.form-input:focus{border-color:var(--gold);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{width:100%;padding:13px;background:var(--dark);color:var(--gold);border:none;border-radius:11px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;letter-spacing:1px;cursor:pointer;margin-top:6px;}
.btn-primary:hover{background:var(--mid);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}

/* FABs */
.fab-group{position:fixed;bottom:22px;right:18px;display:flex;flex-direction:column;gap:10px;z-index:150;}
.fab{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:transform .15s;}
.fab:hover{transform:scale(1.08);}
.fab.fab-venda{background:var(--dark);color:var(--gold);}
.fab.fab-receb{background:var(--green);color:#fff;}
.fab-wrap{display:flex;flex-direction:column;align-items:center;}
.fab-label{font-size:9px;text-align:center;margin-top:2px;color:var(--mid);letter-spacing:.5px;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--gold);padding:10px 20px;border-radius:20px;font-size:13px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sort-select{flex:1;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:12px;color:var(--mid);outline:none;cursor:pointer;}
.sort-select:focus{border-color:var(--gold);}
.sort-btn{padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;color:var(--mid);transition:all .2s;flex-shrink:0;}
.sort-btn:hover,.sort-btn.active{background:var(--dark);color:var(--gold);border-color:var(--dark);}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--light);}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:600px){.content{padding:22px;}}
</style>
</head>

<!-- VENDA SHEET -->
<div class="sheet-overlay" id="sheetVenda" onclick="if(event.target===this)closeSheet('sheetVenda')">
  <div class="sheet">
    <div class="sheet-head"><div class="sheet-title">Nova Venda</div><div class="sheet-close" onclick="closeSheet('sheetVenda')">✕</div></div>
    <div class="form-body">
      <div class="form-group">
        <label class="form-label">Cliente</label>
        <input class="form-input" id="v-cliente" list="clientesList" placeholder="Nome do cliente" autocomplete="off">
        <datalist id="clientesList"></datalist>
      </div>
      <div class="form-group">
        <label class="form-label">Produto / Descrição</label>
        <input class="form-input" id="v-produto" placeholder="Ex: 1 Asad Elixir">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor Total (R$)</label>
          <input class="form-input" id="v-valor" type="number" step="0.01" min="0" placeholder="0,00">
        </div>
        <div class="form-group">
          <label class="form-label">Parcelas</label>
          <input class="form-input" id="v-parcelas" type="number" min="1" max="24" value="3">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">1º Vencimento</label>
          <input class="form-input" id="v-vencimento" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">Data da Venda</label>
          <input class="form-input" id="v-data" type="date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Vendedor</label>
        <select class="form-input" id="v-vendedor">
          <option value="Rodrigo">Rodrigo</option>
          <option value="Jeni">Jeni</option>
          <option value="Matheus">Matheus</option>
          </select>
      </div>
      <button class="btn-primary" id="btnSalvarVenda" onclick="salvarVenda()">Registrar Venda</button>
    </div>
  </div>
</div>

<!-- RECEBIMENTO SHEET -->
<div class="sheet-overlay" id="sheetReceb" onclick="if(event.target===this)closeSheet('sheetReceb')">
  <div class="sheet">
    <div class="sheet-head"><div class="sheet-title">Registrar Recebimento</div><div class="sheet-close" onclick="closeSheet('sheetReceb')">✕</div></div>
    <div class="form-body">
      <div class="form-group">
        <label class="form-label">Cliente</label>
        <input class="form-input" id="r-cliente" list="clientesList2" placeholder="Nome do cliente" autocomplete="off">
        <datalist id="clientesList2"></datalist>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor Recebido (R$)</label>
          <input class="form-input" id="r-valor" type="number" step="0.01" min="0" placeholder="0,00">

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── STATE ─────────────────────────────────────────────────────
let state = {

  totals: {vendas:0, recebido:0, saldo:0}, loaded: false

let cliFilter = 'todos', rankFilter = 'saldo';
const TODAY = new Date();
const CURRENT_MONTH = `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;

// ── HELPERS ───────────────────────────────────────────────────
const BRL = v => 'R$\u00a0' + Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const parseD = d => {
  try {
    if (!d || typeof d !== 'string') return new Date(0);
    const parts = d.trim().split('/');
    if (parts.length !== 3) return new Date(0);
    let [dd, mm, yy] = parts;
    let year = parseInt(yy);
    if (year < 100) year += 2000; // 25 -> 2025
    const dt = new Date(year, parseInt(mm)-1, parseInt(dd));
    return isNaN(dt.getTime()) ? new Date(0) : dt;
  } catch(e){ return new Date(0); }
};
const fmtD = d => d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
const monthKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const addMonths = (d,n) => { const r=new Date(d); r.setMonth(r.getMonth()+n); return r; };
const round2 = n => Math.round(n*100)/100;

function stParcela(p) {
  const falta = round2(p.valor - p.pago);
  if (falta <= 0.05) return 'pago';
  if (parseD(p.data) < TODAY) return 'vencido';
  return p.pago > 0 ? 'parcial' : 'aberto';
}

// ── API CALLS ─────────────────────────────────────────────────
async function apiGet(action, params='') {
  if (!API_URL || API_URL.includes('COLE_AQUI')) return null;
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000); // 20s timeout
    const url = `${API_URL}?action=${action}${params}`;
    const r = await fetch(url, {signal: controller.signal});
    clearTimeout(timeout);
    return r.json();
  } catch(e) {
    if (e.name === 'AbortError') return null;
    return null;
  }
}

async function apiPost(body) {
  if (!API_URL || API_URL.includes('COLE_AQUI')) return {ok:false, error:'API não configurada'};
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);
    // Parâmetros diretos na URL — suporte total a acentos e caracteres especiais
    const params = new URLSearchParams();
    for (const [k,v] of Object.entries(body)) params.append(k, String(v));
    const url = `${API_URL}?${params.toString()}`;
    const r = await fetch(url, {signal: controller.signal});
    clearTimeout(timeout);
    return r.json();
  } catch(e) {
    if (e.name === 'AbortError') return {ok:false, error:'Tempo esgotado. Tente novamente.'};
    return {ok:false, error: e.message};
  }
}

async function loadData() {

  try {

    const [resVendas, resReceb] = await Promise.all([

      renderDemoMode();

      return;
    }

    state.vendas = resVendas.vendas || [];
    state.recebimentos = resReceb.recebimentos || [];

  }
}

function jsParseValor(v) {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'number') return Math.round(v * 100) / 100;
  const s = String(v).replace(/R\$\s?/g,'').replace(/\./g,'').replace(',','.').trim();
  const n = parseFloat(s);
  return isNaN(n) ? 0 : Math.round(n * 100) / 100;
}

function buildStateFromRaw() {
  // Build per-client summary and detail from raw vendas/recebimentos
  const clients = {};

  // Process vendas → generate parcelas FIFO-ready
  for (const v of state.vendas) {
    const cli = v.cliente;
    if (!clients[cli]) clients[cli] = {vendas:[], parcelas:[], recebimentos:[], tv:0, tp:0};
    const valParc = round2(jsParseValor(v.valor) / Math.max(1, v.parcelas));
    const vencDate = parseD(v.vencimento);
    for (let i = 0; i < v.parcelas; i++) {
      const dt = addMonths(vencDate, i);
      clients[cli].parcelas.push({data: fmtD(dt), valor: valParc, pago: 0, venda_data: v.data, produto: v.produto});
    }
    clients[cli].vendas.push(v);
    clients[cli].tv = round2(clients[cli].tv + jsParseValor(v.valor));
  }

  // Sort parcelas by date per client
  for (const cli of Object.keys(clients)) {
    clients[cli].parcelas.sort((a,b) => parseD(a.data) - parseD(b.data));
  }

  // Process recebimentos → FIFO apply
  const recebByClient = {};
  for (const r of state.recebimentos) {
    if (!recebByClient[r.cliente]) recebByClient[r.cliente] = [];
    recebByClient[r.cliente].push(r);
  }

  for (const [cli, recList] of Object.entries(recebByClient)) {
    if (!clients[cli]) clients[cli] = {vendas:[], parcelas:[], recebimentos:[], tv:0, tp:0};
    const sorted = [...recList].sort((a,b) => parseD(a.data) - parseD(b.data));
    for (const rec of sorted) {
      let saldo = jsParseValor(rec.valor);
      let fifoLimit = 0;
      for (const p of clients[cli].parcelas) {
        if (saldo <= 0.01 || ++fifoLimit > 500) break;
        const falta = round2(p.valor - p.pago);
        if (falta <= 0.01) continue;
        const abate = Math.min(saldo, falta);
        p.pago = round2(p.pago + abate);
        saldo = round2(saldo - abate);
      }
      clients[cli].tp = round2(clients[cli].tp + jsParseValor(rec.valor));
      clients[cli].recebimentos.push(rec);
    }
  }

  // Build summary + merged parcelas detail
  state.summary = {};
  state.detail = {};
  let totalV = 0, totalP = 0;

  for (const [cli, d] of Object.entries(clients)) {
    const saldo = round2(Math.max(0, d.tv - d.tp));
    const hasVencido = d.parcelas.some(p => stParcela(p) === 'vencido');
    state.summary[cli] = {n:cli, tv:d.tv, tp:d.tp, s:saldo, nparc:d.parcelas.length, v:hasVencido};
    totalV = round2(totalV + d.tv);
    totalP = round2(totalP + d.tp);

    // Merge same-day parcelas
    const dateMap = {};
    for (const p of d.parcelas) {
      if (!dateMap[p.data]) dateMap[p.data] = {data:p.data, valor:0, pago:0};
      dateMap[p.data].valor = round2(dateMap[p.data].valor + p.valor);
      dateMap[p.data].pago  = round2(dateMap[p.data].pago  + p.pago);
    }
    const mergedParc = Object.values(dateMap).sort((a,b) => parseD(a.data)-parseD(b.data));

    // Rebuild vendas per client (group by venda_data+produto)
    const vendaMap = {};
    for (const p of d.parcelas) {
      const k = (p.venda_data||'')+'|'+(p.produto||'');
      if (!vendaMap[k]) vendaMap[k] = {data:p.venda_data||'', produto:p.produto||'', valor:0, nparcelas:0, vendedor:p.vendedor||''};
      vendaMap[k].valor = round2(vendaMap[k].valor + p.valor);
      vendaMap[k].nparcelas++;
    }

    state.detail[cli] = {
      parcelas: mergedParc,
      recebimentos: [...d.recebimentos].sort((a,b) => parseD(a.data)-parseD(b.data)),
      vendas: Object.values(vendaMap).sort((a,b) => parseD(a.data)-parseD(b.data))
    };
  }

  state.totals = {vendas: totalV, recebido: totalP, saldo: round2(totalV - totalP)};

  // Build monthly projection
  const monthly = {};
  for (const [cli, d] of Object.entries(clients)) {
    for (const p of d.parcelas) {
      const k = monthKey(parseD(p.data));
      if (!monthly[k]) monthly[k] = {prov:0, paid:0, receb:0};
      monthly[k].prov = round2(monthly[k].prov + p.valor);
      monthly[k].paid = round2(monthly[k].paid + p.pago);
    }
  }
  for (const r of state.recebimentos) {
    const k = monthKey(parseD(r.data));
    if (!monthly[k]) monthly[k] = {prov:0, paid:0, receb:0};
    monthly[k].receb = round2(monthly[k].receb + r.valor);
  }

  const MONTH_LABELS = {'2025-03':'Mar/25','2025-12':'Dez/25','2026-01':'Jan/26','2026-02':'Fev/26','2026-03':'Mar/26','2026-04':'Abr/26','2026-05':'Mai/26','2026-06':'Jun/26','2026-07':'Jul/26','2026-08':'Ago/26','2026-09':'Set/26','2026-10':'Out/26','2026-11':'Nov/26','2026-12':'Dez/26'};
  state.monthly = Object.entries(monthly).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>({
    key:k, label:MONTH_LABELS[k]||k, prov:v.prov, receb:v.receb, aberto:round2(Math.max(0,v.prov-v.paid))
  }));
}

          </div>

function renderCli() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const vendedorFiltro = document.getElementById('vendedorFilter')?.value || '';
  let list = Object.values(state.summary).filter(c=>c.tv>0||c.s>0);
  if (q) list = list.filter(c=>c.n.toLowerCase().includes(q));
  if (cliFilter==='aberto')  list = list.filter(c=>c.s>0.05);
  if (cliFilter==='quitado') list = list.filter(c=>c.s<=0.05&&c.tv>0);
  if (cliFilter==='vencido') list = list.filter(c=>c.v);
  if (vendedorFiltro) {
    list = list.filter(c => {
      const det = state.detail[c.n];
      return det?.vendas?.some(v => v.vendedor === vendedorFiltro);
    });
  }
  const sort = document.getElementById('sortSelect')?.value || 'saldo_desc';
  if (sort === 'saldo_desc')  list.sort((a,b) => b.s - a.s);
  else if (sort === 'saldo_asc')   list.sort((a,b) => a.s - b.s);
  else if (sort === 'nome_asc')    list.sort((a,b) => a.n.localeCompare(b.n, 'pt-BR'));
  else if (sort === 'nome_desc')   list.sort((a,b) => b.n.localeCompare(a.n, 'pt-BR'));
  else if (sort === 'valor_desc')  list.sort((a,b) => b.tv - a.tv);
  else if (sort === 'valor_asc')   list.sort((a,b) => a.tv - b.tv);
  else if (sort === 'vencido') {
    list.sort((a,b) => {
      const av = a.v ? 1 : 0, bv = b.v ? 1 : 0;
      if (bv !== av) return bv - av; // vencidos primeiro
      return b.s - a.s; // depois por saldo
    });
  }

  const el = document.getElementById('cliList');
  if (!list.length){el.innerHTML='<div class="empty">Nenhum cliente encontrado</div>';return;}
  el.innerHTML = list.map(c=>{
    const pct = c.tv>0?Math.round(c.tp/c.tv*100):100;
    const init = c.n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    return `<div class="cli-card" onclick="openModal('${c.n.replace(/'/g,"\\'")}')">
      <div class="cli-header">
        <div class="cli-avatar">${init}</div>
        <div class="cli-info"><div class="cli-name">${c.n}</div><div class="cli-meta">${c.nparc} parcelas · ${BRL(c.tv)}</div></div>
        <div class="cli-saldo">
          <div class="saldo-v ${c.s<=0.05?'zero':'pos'}">${BRL(c.s)}</div>
          <div class="saldo-lbl">${c.v?'⚠ vencido':'saldo'}</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderProj() {
  if (currentUser.role === 'vendedor') {
    document.getElementById('sec-projecao').innerHTML = '<div class="empty">Projeção disponível apenas para administradores.</div>';
    return;
  }
  const monthly = state.monthly;
  const maxProv = Math.max(...monthly.map(m=>m.prov),1);
  const totalProv = monthly.reduce((s,m)=>s+m.prov,0);
  const totalReceb = monthly.reduce((s,m)=>s+m.receb,0);
  const totalOpen = monthly.reduce((s,m)=>s+m.aberto,0);

  const rows = monthly.map(m=>{
    const cur = m.key===CURRENT_MONTH;
    const pctR = m.prov>0?Math.min(100,Math.round(m.receb/m.prov*100)):0;
    const pctO = m.prov>0?Math.min(100,Math.round(m.aberto/m.prov*100)):0;
    const barPct = Math.round(m.prov/maxProv*100);
    return `<tr class="${cur?'cur-m':''}">
      <td>${m.label}</td>
      <td><div class="num">${m.prov>0?BRL(m.prov):'—'}</div>${m.prov>0?`<div class="mini-bar"><div class="mini-fill" style="width:${barPct}%;background:var(--border)"></div></div>`:''}</td>
      <td><div class="num" style="color:${m.receb>0?'var(--green)':'var(--light)'}">${m.receb>0?BRL(m.receb):'—'}</div>${m.receb>0&&m.prov>0?`<div class="pct-tag">${pctR}%</div>`:''}</td>
      <td><div class="num" style="color:${m.aberto>0.01?'var(--red)':'var(--green)'}">${m.aberto>0.01?BRL(m.aberto):'<span style="color:var(--green)">✓</span>'}</div>${m.aberto>0.01&&m.prov>0?`<div class="pct-tag">${pctO}%</div>`:''}</td>
    </tr>`;
  }).join('');

  document.getElementById('sec-projecao').innerHTML = `
    <div class="kpi-row" style="margin-bottom:13px">
      <div class="kpi"><div class="kpi-label">Provisionado</div><div class="kpi-value">${BRL(totalProv)}</div></div>
      <div class="kpi"><div class="kpi-label">Recebido</div><div class="kpi-value" style="color:var(--green)">${BRL(totalReceb)}</div></div>
      <div class="kpi"><div class="kpi-label">Em aberto</div><div class="kpi-value" style="color:var(--red)">${BRL(totalOpen)}</div></div>
    </div>
    <div class="block" style="padding:0">
      <div class="proj-wrap"><table class="proj-table">
        <thead><tr><th>Mês</th><th>Provisionado</th><th>Recebido</th><th>Em aberto</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr style="background:var(--bg);font-weight:600">
          <td>Total</td>
          <td style="text-align:right"><div class="num">${BRL(totalProv)}</div></td>
          <td style="text-align:right"><div class="num" style="color:var(--green)">${BRL(totalReceb)}</div></td>
          <td style="text-align:right"><div class="num" style="color:var(--red)">${BRL(totalOpen)}</div></td>
        </tr></tfoot>
      </table></div>
    </div>`;
}

function renderRank() {
  if (currentUser.role === 'vendedor') {
    document.getElementById('rankList').innerHTML = '<div class="empty">Ranking disponível apenas para administradores.</div>';
    return;
  }
  let sorted;
  if (rankFilter==='saldo') sorted = Object.values(state.summary).filter(c=>c.s>0.05).sort((a,b)=>b.s-a.s);
  else if (rankFilter==='vendido') sorted = Object.values(state.summary).filter(c=>c.tv>0).sort((a,b)=>b.tv-a.tv);
  else sorted = Object.values(state.summary).filter(c=>c.nparc>0).sort((a,b)=>b.nparc-a.nparc);
  sorted = sorted.slice(0,20);
  document.getElementById('rankList').innerHTML = sorted.map((c,i)=>{
    const val = rankFilter==='saldo'?c.s:rankFilter==='vendido'?c.tv:null;
    const disp = val!=null?`<div class="rank-v">${BRL(val)}</div>`:`<div class="rank-v" style="color:var(--mid)">${c.nparc} parc.</div>`;
    return `<div class="rank-row" onclick="openModal('${c.n.replace(/'/g,"\\'")}')">
      <div class="rank-n">${i+1}</div>
      <div class="rank-info"><div class="rank-name">${c.n}</div><div class="rank-meta">${rankFilter==='saldo'?BRL(c.tv)+' vendido':''}</div></div>
      ${disp}
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(name) {
  const sum = state.summary[name] || {n:name,tv:0,tp:0,s:0,nparc:0,v:false};
  const det = state.detail[name];
  const pct = sum.tv>0?Math.round(sum.tp/sum.tv*100):100;

  let vendasHtml = '';
  if (det?.vendas?.length) {
    vendasHtml = `<div class="m-stitle">Vendas</div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Data</th><th>Produto</th><th>Parc.</th><th>Valor</th></tr></thead>
      <tbody>${[...det.vendas].sort((a,b)=>parseD(a.data)-parseD(b.data)).map(v=>`<tr><td>${v.data}</td><td>${v.produto}</td><td>${v.nparcelas}x</td><td>${BRL(v.valor)}</td></tr>`).join('')}</tbody>
    </table></div>`;
  }

  const stMap = {pago:'st-pago',parcial:'st-parcial',aberto:'st-aberto',vencido:'st-vencido'};
  const stLabel = {pago:'Pago',parcial:'Parcial',aberto:'Em aberto',vencido:'⚠ Vencido'};
  let parcHtml = `<div class="m-stitle">Parcelas</div>`;
  if (det?.parcelas?.length) {
    parcHtml += det.parcelas.map(p=>{
      const st = stParcela(p); const falta = round2(p.valor-p.pago);
      return `<div class="parc-row">
        <div class="parc-date">${p.data}</div>
        <div class="st-dot ${stMap[st]}"></div>
        <div style="flex:1;font-size:10px;color:var(--light)">${stLabel[st]}</div>
        <div class="parc-right"><div class="parc-valor">${BRL(p.valor)}</div>
        <div class="parc-falta" style="color:${falta>0.05?'var(--red)':'var(--green)'}">${falta<=0.05?'✓':'-'+BRL(falta)}</div></div>
      </div>`;
    }).join('');
  } else parcHtml += '<div class="empty">Sem parcelas</div>';

  let recebHtml = `<div class="m-stitle">Recebimentos <span style="color:var(--green);font-size:11px">— total ${BRL(sum.tp)}</span></div>`;
  if (det?.recebimentos?.length) {
    recebHtml += det.recebimentos.map(r=>`<div class="receb-row"><div class="receb-dt">${r.data}</div><div class="receb-v">+ ${BRL(r.valor)}</div></div>`).join('');
  } else recebHtml += '<div class="empty">Nenhum recebimento</div>';

  document.getElementById('modalContent').innerHTML = `
    <div class="m-head"><div class="m-name">${name}</div><div class="m-meta">${pct}% pago · ${sum.nparc} parcelas</div></div>
    <div class="m-stats">
      <div class="mst"><div class="mst-v">${BRL(sum.tv)}</div><div class="mst-l">Vendido</div></div>
      <div class="mst"><div class="mst-v" style="color:var(--green)">${BRL(sum.tp)}</div><div class="mst-l">Pago</div></div>
      <div class="mst"><div class="mst-v" style="color:${sum.s>0.05?'var(--red)':'var(--green)'}">${BRL(sum.s)}</div><div class="mst-l">Saldo</div></div>
    </div>
    ${vendasHtml}${recebHtml}${parcHtml}`;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}

// Swipe down para fechar modal no celular
(function(){
  let startY = 0;
  document.addEventListener('touchstart', e => {
    if (e.target.closest('.modal')) startY = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchend', e => {
    if (!startY) return;
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 80) closeModal();
    startY = 0;
  }, {passive:true});
})();

// ── HELPERS PT-BR ────────────────────────────────────────────
function todayBR() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth()+1).padStart(2,'0') + '/' +
         d.getFullYear();
}

// ── LANÇAMENTOS ───────────────────────────────────────────────
async function salvarVenda() {
  const cli      = document.getElementById('v-cliente').value.trim();
  const produto  = document.getElementById('v-produto').value.trim();
  const valor    = parseFloat(document.getElementById('v-valor').value);
  const nparc    = parseInt(document.getElementById('v-parcelas').value);
  const vencInput= document.getElementById('v-vencimento').value;
  const dataInput= document.getElementById('v-data').value;

  if (!cli||!produto||!valor||!nparc||!vencInput) { alert('Preencha todos os campos.'); return; }

  const btn = document.getElementById('btnSalvarVenda');
  btn.disabled = true; btn.textContent = 'Salvando...';

  const isoToBR = s => s ? s.split('-').reverse().join('/') : todayBR();
  const vencDisplay = isoToBR(vencInput);
  const dataDisplay = isoToBR(dataInput);

  const res = await apiPost({
    action: 'nova_venda',
    cliente: cli, produto, valor, parcelas: nparc,
    vencimento: vencDisplay, data_venda: dataDisplay,
    vendedor: document.getElementById('v-vendedor')?.value || currentUser.display
  });

  btn.disabled = false; btn.textContent = 'Registrar Venda';

  if (res?.ok) {
    closeSheet('sheetVenda');
    document.getElementById('v-cliente').value = '';
    document.getElementById('v-produto').value = '';
    document.getElementById('v-valor').value = '';
    document.getElementById('v-parcelas').value = '3';
    toast(`✓ Venda de ${BRL(valor)} para ${cli} salva!`);
    setTimeout(() => loadData(), 2000);
  } else {
    btn.textContent = 'Registrar Venda';
    toast(`⚠ Erro: ${res?.error || 'tente novamente'}`);
  }
}

async function salvarRecebimento() {
  const cli   = document.getElementById('r-cliente').value.trim();
  const valor = parseFloat(document.getElementById('r-valor').value);
  const dataInput = document.getElementById('r-data').value;

  if (!cli||!valor||!dataInput) { alert('Preencha todos os campos.'); return; }
  if (!/^\d{2}\/\d{2}\/\d{4}$/.test(dataInput)) { alert('Data inválida. Use dd/mm/aaaa.'); return; }

  const btn = document.getElementById('btnSalvarReceb');
  btn.disabled = true; btn.textContent = 'Salvando...';

  const dataDisplay = dataInput; // já está em dd/mm/aaaa

  const res = await apiPost({
    action: 'novo_recebimento',
    cliente: cli, valor, data_recebimento: dataDisplay,
    vendedor: document.getElementById('v-vendedor')?.value || currentUser.display
  });

  btn.disabled = false; btn.textContent = 'Registrar Recebimento';

  if (res?.ok) {
    closeSheet('sheetReceb');
    document.getElementById('r-cliente').value = '';
    document.getElementById('r-valor').value = '';
    document.getElementById('r-data').value = '';
    document.getElementById('r-saldo-info').style.display = 'none';
    toast(`✓ Recebimento de ${BRL(valor)} de ${cli} salvo!`);
    setTimeout(() => loadData(), 2000);
  } else {
    btn.textContent = 'Registrar Recebimento';
    toast(`⚠ Erro: ${res?.error || 'tente novamente'}`);
  }
}

// ── NAV ───────────────────────────────────────────────────────
function showSec(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  el.classList.add('active');
}
function setF(f,el){cliFilter=f;document.querySelectorAll('#sec-clientes .ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderCli();}
function setR(r,el){rankFilter=r;document.querySelectorAll('#sec-ranking .ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderRank();}

function openSheet(id){
  const today=new Date().toISOString().slice(0,10); // yyyy-mm-dd para type="date"
  const vend = currentUser?.display || 'Rodrigo';
  if(id==='sheetVenda'){
    document.getElementById('v-vencimento').value=today;
    document.getElementById('v-data').value=today;
    const sv = document.getElementById('v-vendedor');
    if(sv) sv.value = vend;
  }
  if(id==='sheetReceb'){
    document.getElementById('r-data').value=today;
    const rv = document.getElementById('r-vendedor');
    if(rv) rv.value = vend;
  }
  document.getElementById(id).classList.add('open');
}
function closeSheet(id){document.getElementById(id).classList.remove('open');}

// saldo hint no form de recebimento
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('r-cliente').addEventListener('input',function(){
    const s = state.summary[this.value.trim()];
    const el = document.getElementById('r-saldo-info');
    if(s&&s.s>0.05){document.getElementById('r-saldo-val').textContent=BRL(s.s);el.style.display='block';}
    else el.style.display='none';
  });
});

// ── START APP ─────────────────────────────────────────────────
function startApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  document.getElementById('userLabel').textContent = currentUser.display;

  // Permissões por perfil
  if (currentUser.role === 'vendedor') {
    document.getElementById('tab-ranking').classList.add('hidden');
    document.getElementById('tab-projecao').classList.add('hidden');
  }
  document.getElementById('fabGroup').style.display = 'flex';
  loadData();
}

// ── INIT ──────────────────────────────────────────────────────
if (checkSession()) {
  startApp();
} // else: loginScreen já está visível
</script>
